<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einkaufszettel</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, #dbeafe, #f8fbff);
      color: #0f172a;
    }

    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 22px 50px rgba(37, 99, 235, 0.14);
      margin-bottom: 16px;
      border: 1px solid rgba(147, 197, 253, 0.45);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 14px;
      border-radius: 22px;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 35px rgba(37, 99, 235, 0.25);
    }

    .logo svg {
      width: 42px;
      height: 42px;
      color: white;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 30px;
      color: #1d4ed8;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 17px;
      border: 1px solid #bfdbfe;
      font-size: 16px;
      margin-bottom: 10px;
      outline: none;
      background: #f8fbff;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      border: none;
      border-radius: 17px;
      padding: 15px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      background: #2563eb;
      color: white;
      width: 100%;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    button:active {
      transform: scale(0.94);
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.18);
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #dbeafe;
      color: #1e40af;
      box-shadow: none;
    }

    button.secondary:hover {
      background: #bfdbfe;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-radius: 19px;
      background: #f8fbff;
      margin-bottom: 10px;
      border: 1px solid #dbeafe;
      animation: popIn 0.22s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .item.checked {
      background: #dcfce7;
      border-color: #86efac;
    }

    .item-title {
      font-weight: 850;
    }

    .item-meta {
      font-size: 13px;
      color: #64748b;
      margin-top: 3px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .hidden { display: none; }

    .empty {
      text-align: center;
      color: #64748b;
      padding: 25px 0;
    }

    .logout {
      margin-top: 10px;
    }

    .small-btn {
      width: 88px;
      padding: 13px 10px;
      border-radius: 15px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="authBox" class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3h8l2 2v16H6V5l2-2z"/>
          <path d="M9 8h6"/>
          <path d="M9 12h6"/>
          <path d="M9 16h4"/>
          <path d="M16 3v3h3"/>
        </svg>
      </div>

      <h1>Einkaufszettel</h1>

      <input id="email" type="email" placeholder="E-Mail" />
      <input id="password" type="password" placeholder="Passwort" />

      <button onclick="login()">Einloggen</button>
      <br><br>
      <button class="secondary" onclick="register()">Registrieren</button>
    </div>

    <div id="mainApp" class="hidden">
      <div class="card">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3h8l2 2v16H6V5l2-2z"/>
            <path d="M9 8h6"/>
            <path d="M9 12h6"/>
            <path d="M9 16h4"/>
            <path d="M16 3v3h3"/>
          </svg>
        </div>

        <h1>Einkauf</h1>

        <div class="row">
          <input id="newItem" placeholder="z.B. Milch" />
          <button onclick="addItem()" class="small-btn">+</button>
        </div>

        <button class="secondary logout" onclick="logout()">Abmelden</button>
      </div>

      <div class="card">
        <div class="tabs">
          <button onclick="showTab('list')">Liste</button>
          <button class="secondary" onclick="showTab('bought')">Eingekauft</button>
        </div>

        <div id="listTab">
          <div id="shoppingList"></div>
        </div>

        <div id="boughtTab" class="hidden">
          <div id="boughtList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "DEINE_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "DEIN_SUPABASE_ANON_KEY";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      currentUser = data.session?.user || null;

      if (currentUser) {
        document.getElementById("authBox").classList.add("hidden");
        document.getElementById("mainApp").classList.remove("hidden");
        loadItems();
      }

      supabaseClient
        .channel("shopping_items_changes")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "shopping_items" },
          () => loadItems()
        )
        .subscribe();

      setInterval(moveOldCheckedItems, 60000);
    }

    async function register() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Bitte E-Mail und Passwort eingeben.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      alert("Registriert. Falls E-Mail-Bestätigung aktiv ist, bitte Mail bestätigen.");
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Bitte E-Mail und Passwort eingeben.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      currentUser = data.user;
      document.getElementById("authBox").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");
      loadItems();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function addItem() {
      const input = document.getElementById("newItem");
      const name = input.value.trim();

      if (!name) return;

      const { error } = await supabaseClient.from("shopping_items").insert({
        name,
        status: "open",
        added_by: currentUser.email
      });

      if (error) {
        alert(error.message);
        return;
      }

      input.value = "";
      loadItems();
    }

    async function checkItem(id) {
      await supabaseClient
        .from("shopping_items")
        .update({
          status: "checked",
          checked_at: new Date().toISOString(),
          bought_by: currentUser.email
        })
        .eq("id", id);

      loadItems();
    }

    async function uncheckItem(id) {
      await supabaseClient
        .from("shopping_items")
        .update({
          status: "open",
          checked_at: null,
          bought_by: null
        })
        .eq("id", id);

      loadItems();
    }

    async function moveOldCheckedItems() {
      const limit = new Date(Date.now() - 20 * 60 * 1000).toISOString();

      await supabaseClient
        .from("shopping_items")
        .update({ status: "bought" })
        .eq("status", "checked")
        .lt("checked_at", limit);

      loadItems();
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("shopping_items")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        alert(error.message);
        return;
      }

      renderShoppingList(data.filter(item => item.status !== "bought"));
      renderBoughtList(data.filter(item => item.status === "bought"));
    }

    function renderShoppingList(items) {
      const box = document.getElementById("shoppingList");
      box.innerHTML = "";

      if (items.length === 0) {
        box.innerHTML = `<div class="empty">Keine Artikel offen</div>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item" + (item.status === "checked" ? " checked" : "");

        div.innerHTML = `
          <div>
            <div class="item-title">${escapeHtml(item.name)}</div>
            <div class="item-meta">
              ${item.status === "checked" ? `gekauft von ${item.bought_by}` : `hinzugefügt von ${item.added_by}`}
            </div>
          </div>

          ${
            item.status === "checked"
              ? `<button class="secondary small-btn" onclick="uncheckItem('${item.id}')">Zurück</button>`
              : `<button class="small-btn" onclick="checkItem('${item.id}')">✓</button>`
          }
        `;

        box.appendChild(div);
      });
    }

    function renderBoughtList(items) {
      const box = document.getElementById("boughtList");
      box.innerHTML = "";

      if (items.length === 0) {
        box.innerHTML = `<div class="empty">Noch nichts eingekauft</div>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <div>
            <div class="item-title">${escapeHtml(item.name)}</div>
            <div class="item-meta">
              gekauft von ${item.bought_by || "unbekannt"}<br>
              ${formatDate(item.checked_at)}
            </div>
          </div>
        `;

        box.appendChild(div);
      });
    }

    function showTab(tab) {
      document.getElementById("listTab").classList.toggle("hidden", tab !== "list");
      document.getElementById("boughtTab").classList.toggle("hidden", tab !== "bought");
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      return new Date(dateString).toLocaleString("de-DE");
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    init();
  </script>
</body>
</html>
