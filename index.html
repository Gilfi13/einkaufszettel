<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einkaufszettel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7f8;
      color: #0f172a;
    }

    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px;
      padding-bottom: 98px;
    }

    .card {
      background: rgba(255,255,255,0.96);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 22px 55px rgba(15, 23, 42, 0.10);
      margin-bottom: 16px;
      border: 1px solid rgba(226, 232, 240, 0.9);
    }

    .main-header {
      display: grid;
      grid-template-columns: 58px 1fr 46px;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 19px;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.08);
    }

    .logo svg {
      width: 34px;
      height: 34px;
      color: #1d4ed8;
    }

    .instance-title {
      font-size: 24px;
      font-weight: 900;
      color: #0f172a;
      line-height: 1.35;
      padding-bottom: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-btn {
      width: 46px;
      height: 46px;
      padding: 0;
      border-radius: 15px;
      font-size: 22px;
      background: #eff6ff;
      color: #1e40af;
      box-shadow: none;
      border: 1px solid #dbeafe;
      flex-shrink: 0;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 30px;
      color: #0f172a;
      line-height: 1.2;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 21px;
      color: #0f172a;
    }

    .muted {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #dbeafe;
      font-size: 16px;
      outline: none;
      background: #eff6ff;
      font-family: inherit;
    }

    input {
      margin-bottom: 10px;
    }

    textarea {
      height: 52px;
      min-height: 52px;
      resize: none;
      margin-top: 12px;
      margin-bottom: 0;
      width: 100%;
      display: block;
    }

    input:focus, textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    button {
      border: none;
      border-radius: 17px;
      padding: 15px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      background: #2563eb;
      color: white;
      width: 100%;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.18);
    }

    button:active {
      transform: scale(0.96);
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.14);
    }

    button:focus {
      outline: none;
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.18);
      outline-offset: 3px;
      border-radius: 17px;
    }

    button.secondary {
      background: #eff6ff;
      color: #1e40af;
      box-shadow: none;
      border: 1px solid #dbeafe;
    }

    .logout-btn {
      background: #ef4444;
      box-shadow: 0 8px 18px rgba(239, 68, 68, 0.18);
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .add-input {
      height: 54px;
      margin-bottom: 0;
    }

    .add-btn {
      width: 64px;
      height: 54px;
      padding: 0;
      font-size: 26px;
      flex-shrink: 0;
    }

    .item {
      padding: 15px;
      border-radius: 19px;
      background: #f8fbff;
      margin-bottom: 10px;
      border: 1px solid #dbeafe;
      animation: popIn 0.22s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .item.checked {
      background: #dcfce7;
      border-color: #86efac;
    }

    .item-main {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item-title {
      font-weight: 850;
      font-size: 17px;
    }

    .item-meta {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
      line-height: 1.4;
    }

    .comment {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: white;
      color: #334155;
      font-size: 14px;
      border: 1px solid #e0ecff;
      line-height: 1.4;
    }

    .bottom-tabs {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: calc(100% - 28px);
      max-width: 402px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(226, 232, 240, 0.95);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.14);
      border-radius: 24px;
      padding: 10px;
      display: flex;
      gap: 10px;
      z-index: 20;
    }

    .tab-btn {
      box-shadow: none;
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #dbeafe;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
      border-color: #1d4ed8;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    .small-btn {
      width: 82px;
      padding: 12px 10px;
      border-radius: 15px;
      font-size: 14px;
    }

    .hidden {
      display: none !important;
    }

    .empty {
      text-align: center;
      color: #64748b;
      padding: 25px 0;
    }

    .instance-chip {
      padding: 13px;
      border-radius: 16px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      margin-bottom: 10px;
      font-weight: 800;
      color: #1e40af;
      cursor: pointer;
    }

    .settings-list button {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="authBox" class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3h8l2 2v16H6V5l2-2z"/>
          <path d="M9 8h6"/>
          <path d="M9 12h6"/>
          <path d="M9 16h4"/>
          <path d="M16 3v3h3"/>
        </svg>
      </div>

      <br>
      <h1>Einkaufszettel</h1>

      <input id="email" type="email" placeholder="E-Mail" />
      <input id="password" type="password" placeholder="Passwort" />

      <button onclick="login()">Einloggen</button>
      <br><br>
      <button class="secondary" onclick="register()">Registrieren</button>
    </div>

    <div id="profileBox" class="card hidden">
      <h1>Dein Name</h1>
      <div class="muted">Dieser Name wird später bei Artikeln angezeigt.</div>
      <input id="nicknameInput" placeholder="z.B. Dominik" />
      <button onclick="saveNickname()">Speichern</button>
    </div>

    <div id="instanceBox" class="card hidden">
      <h1>Familie wählen</h1>
      <div class="muted">Erstelle eine Liste oder tritt einer bestehenden Liste bei.</div>

      <h2>Meine Listen</h2>
      <div id="myInstances"></div>

      <br>

      <h2>Neue Liste erstellen</h2>
      <input id="createInstanceName" placeholder="Name, z.B. Familie" />
      <input id="createInstancePassword" type="password" placeholder="Passwort" />
      <button onclick="createInstance()">Erstellen</button>

      <br><br>

      <h2>Liste beitreten</h2>
      <input id="joinInstanceName" placeholder="Name der Liste" />
      <input id="joinInstancePassword" type="password" placeholder="Passwort" />
      <button class="secondary" onclick="joinInstance()">Beitreten</button>
    </div>

    <div id="mainApp" class="hidden">
      <div class="card">
        <div class="main-header">
          <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3h8l2 2v16H6V5l2-2z"/>
              <path d="M9 8h6"/>
              <path d="M9 12h6"/>
              <path d="M9 16h4"/>
              <path d="M16 3v3h3"/>
            </svg>
          </div>

          <div id="appTitle" class="instance-title">Einkauf</div>

          <button class="settings-btn" onclick="showSettings()">⚙</button>
        </div>

        <div class="row">
          <input id="newItem" class="add-input" placeholder="Artikel eingeben" />
          <button onclick="addItem()" class="add-btn">+</button>
        </div>

        <textarea id="newComment" placeholder="Kommentar hinzufügen"></textarea>
      </div>

      <div class="card">
        <div id="listTab">
          <div id="shoppingList"></div>
        </div>

        <div id="boughtTab" class="hidden">
          <div id="boughtList"></div>
        </div>
      </div>

      <div class="bottom-tabs">
        <button id="listTabBtn" class="tab-btn active" onclick="showTab('list')">Liste</button>
        <button id="boughtTabBtn" class="tab-btn" onclick="showTab('bought')">Eingekauft</button>
      </div>
    </div>

    <div id="settingsBox" class="card hidden">
      <h1>Einstellungen</h1>
      <div class="muted" id="settingsInfo"></div>

      <div class="settings-list">
        <button class="secondary" onclick="backToApp()">Zurück</button>
        <button onclick="showNicknameEdit()">Nickname ändern</button>
        <button onclick="leaveInstanceView()">Liste wechseln</button>
        <button class="logout-btn" onclick="logout()">Abmelden</button>
      </div>
    </div>

    <div id="nicknameEditBox" class="card hidden">
      <h1>Nickname ändern</h1>
      <input id="nicknameEditInput" placeholder="Neuer Nickname" />
      <button onclick="updateNicknameFromSettings()">Speichern</button>
      <br><br>
      <button class="secondary" onclick="showSettings()">Zurück</button>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://gromokgqugxopbfokhth.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ABmh32TTwpVufI-G2H97dg_Ixai_2B2";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentProfile = null;
    let currentInstanceId = localStorage.getItem("currentInstanceId");
    let currentInstanceName = localStorage.getItem("currentInstanceName");

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      currentUser = data.session?.user || null;

      if (!currentUser) {
        showOnly("authBox");
        return;
      }

      await loadProfile();

      if (!currentProfile?.nickname) {
        showOnly("profileBox");
        return;
      }

      if (!currentInstanceId) {
        showOnly("instanceBox");
        loadMyInstances();
        return;
      }

      showMainApp();

      supabaseClient
        .channel("shopping_items_changes")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "shopping_items" },
          () => loadItems()
        )
        .subscribe();

      setInterval(moveOldCheckedItems, 60000);
    }

    function showOnly(id) {
      ["authBox", "profileBox", "instanceBox", "mainApp", "settingsBox", "nicknameEditBox"].forEach(box => {
        document.getElementById(box).classList.add("hidden");
      });
      document.getElementById(id).classList.remove("hidden");
    }

    async function register() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Bitte E-Mail und Passwort eingeben.");
        return;
      }

      const { error } = await supabaseClient.auth.signUp({ email, password });

      if (error) alert(error.message);
      else alert("Registriert. Danach bitte einloggen.");
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Bitte E-Mail und Passwort eingeben.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        alert(error.message);
        return;
      }

      currentUser = data.user;
      await loadProfile();

      if (!currentProfile?.nickname) showOnly("profileBox");
      else if (!currentInstanceId) {
        showOnly("instanceBox");
        loadMyInstances();
      } else {
        showMainApp();
      }
    }

    async function logout() {
      localStorage.removeItem("currentInstanceId");
      localStorage.removeItem("currentInstanceName");
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function loadProfile() {
      const { data } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      if (!data) {
        const { data: created, error } = await supabaseClient
          .from("profiles")
          .insert({
            id: currentUser.id,
            email: currentUser.email,
            nickname: null
          })
          .select()
          .single();

        if (error) {
          alert(error.message);
          return;
        }

        currentProfile = created;
      } else {
        currentProfile = data;
      }
    }

    async function saveNickname() {
      const nickname = document.getElementById("nicknameInput").value.trim();

      if (!nickname) {
        alert("Bitte gib einen Namen ein.");
        return;
      }

      const { data, error } = await supabaseClient
        .from("profiles")
        .update({ nickname })
        .eq("id", currentUser.id)
        .select()
        .single();

      if (error) {
        alert(error.message);
        return;
      }

      currentProfile = data;
      showOnly("instanceBox");
      loadMyInstances();
    }

    function showSettings() {
      document.getElementById("settingsInfo").textContent =
        `Angemeldet als ${currentProfile?.nickname || "Unbekannt"} · Liste: ${currentInstanceName || "Keine"}`;
      showOnly("settingsBox");
    }

    function backToApp() {
      showMainApp();
    }

    function showNicknameEdit() {
      document.getElementById("nicknameEditInput").value = currentProfile?.nickname || "";
      showOnly("nicknameEditBox");
    }

    async function updateNicknameFromSettings() {
      const nickname = document.getElementById("nicknameEditInput").value.trim();

      if (!nickname) {
        alert("Bitte gib einen Namen ein.");
        return;
      }

      const { data, error } = await supabaseClient
        .from("profiles")
        .update({ nickname })
        .eq("id", currentUser.id)
        .select()
        .single();

      if (error) {
        alert(error.message);
        return;
      }

      currentProfile = data;
      showSettings();
    }

    async function loadMyInstances() {
      const box = document.getElementById("myInstances");
      box.innerHTML = "";

      const { data, error } = await supabaseClient
        .from("instance_members")
        .select("instance_id, shopping_instances(name)")
        .eq("user_id", currentUser.id);

      if (error) {
        box.innerHTML = `<div class="empty">${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        box.innerHTML = `<div class="empty">Noch keine Liste</div>`;
        return;
      }

      data.forEach(row => {
        const div = document.createElement("div");
        div.className = "instance-chip";
        div.textContent = row.shopping_instances?.name || "Liste";
        div.onclick = () => selectInstance(row.instance_id, row.shopping_instances?.name || "Liste");
        box.appendChild(div);
      });
    }

    async function createInstance() {
      const name = document.getElementById("createInstanceName").value.trim();
      const password = document.getElementById("createInstancePassword").value.trim();

      if (!name || !password) {
        alert("Bitte Name und Passwort eingeben.");
        return;
      }

      const { data, error } = await supabaseClient.rpc("create_shopping_instance", {
        p_name: name,
        p_password: password
      });

      if (error) {
        alert(error.message);
        return;
      }

      selectInstance(data, name);
    }

    async function joinInstance() {
      const name = document.getElementById("joinInstanceName").value.trim();
      const password = document.getElementById("joinInstancePassword").value.trim();

      if (!name || !password) {
        alert("Bitte Name und Passwort eingeben.");
        return;
      }

      const { data, error } = await supabaseClient.rpc("join_shopping_instance", {
        p_name: name,
        p_password: password
      });

      if (error) {
        alert(error.message);
        return;
      }

      selectInstance(data, name);
    }

    function selectInstance(id, name) {
      currentInstanceId = id;
      currentInstanceName = name;
      localStorage.setItem("currentInstanceId", id);
      localStorage.setItem("currentInstanceName", name);
      showMainApp();
    }

    function leaveInstanceView() {
      currentInstanceId = null;
      currentInstanceName = null;
      localStorage.removeItem("currentInstanceId");
      localStorage.removeItem("currentInstanceName");
      showOnly("instanceBox");
      loadMyInstances();
    }

    function showMainApp() {
      document.getElementById("appTitle").textContent = currentInstanceName || "Einkauf";
      showOnly("mainApp");
      loadItems();
    }

    async function addItem() {
      const input = document.getElementById("newItem");
      const commentInput = document.getElementById("newComment");

      const name = input.value.trim();
      const comment = commentInput.value.trim();

      if (!name) return;

      const { error } = await supabaseClient.from("shopping_items").insert({
        instance_id: currentInstanceId,
        name,
        comment: comment || null,
        status: "open",
        added_by: currentUser.id,
        added_by_nickname: currentProfile.nickname
      });

      if (error) {
        alert(error.message);
        return;
      }

      input.value = "";
      commentInput.value = "";
      loadItems();
    }

    async function checkItem(id) {
      await supabaseClient
        .from("shopping_items")
        .update({
          status: "checked",
          checked_at: new Date().toISOString(),
          bought_by: currentUser.id,
          bought_by_nickname: currentProfile.nickname
        })
        .eq("id", id);

      loadItems();
    }

    async function uncheckItem(id) {
      await supabaseClient
        .from("shopping_items")
        .update({
          status: "open",
          checked_at: null,
          bought_by: null,
          bought_by_nickname: null
        })
        .eq("id", id);

      loadItems();
    }

    async function moveOldCheckedItems() {
      if (!currentInstanceId) return;

      const limit = new Date(Date.now() - 20 * 60 * 1000).toISOString();

      await supabaseClient
        .from("shopping_items")
        .update({ status: "bought" })
        .eq("instance_id", currentInstanceId)
        .eq("status", "checked")
        .lt("checked_at", limit);

      loadItems();
    }

    async function loadItems() {
      if (!currentInstanceId) return;

      await moveOldCheckedItemsNoReload();

      const { data, error } = await supabaseClient
        .from("shopping_items")
        .select("*")
        .eq("instance_id", currentInstanceId)
        .order("created_at", { ascending: false });

      if (error) {
        alert(error.message);
        return;
      }

      renderShoppingList(data.filter(item => item.status !== "bought"));
      renderBoughtList(data.filter(item => item.status === "bought"));
    }

    async function moveOldCheckedItemsNoReload() {
      const limit = new Date(Date.now() - 20 * 60 * 1000).toISOString();

      await supabaseClient
        .from("shopping_items")
        .update({ status: "bought" })
        .eq("instance_id", currentInstanceId)
        .eq("status", "checked")
        .lt("checked_at", limit);
    }

    function renderShoppingList(items) {
      const box = document.getElementById("shoppingList");
      box.innerHTML = "";

      if (items.length === 0) {
        box.innerHTML = `<div class="empty">Keine Artikel offen</div>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item" + (item.status === "checked" ? " checked" : "");

        div.innerHTML = `
          <div class="item-main">
            <div>
              <div class="item-title">${escapeHtml(item.name)}</div>
              <div class="item-meta">
                von ${escapeHtml(item.added_by_nickname || "Unbekannt")} · ${formatDate(item.created_at)}
                ${item.status === "checked" ? `<br>abgehakt von ${escapeHtml(item.bought_by_nickname || "Unbekannt")}` : ""}
              </div>
            </div>

            ${
              item.status === "checked"
                ? `<button class="secondary small-btn" onclick="uncheckItem('${item.id}')">Zurück</button>`
                : `<button class="small-btn" onclick="checkItem('${item.id}')">✓</button>`
            }
          </div>

          ${item.comment ? `<div class="comment">${escapeHtml(item.comment)}</div>` : ""}
        `;

        box.appendChild(div);
      });
    }

    function renderBoughtList(items) {
      const box = document.getElementById("boughtList");
      box.innerHTML = "";

      if (items.length === 0) {
        box.innerHTML = `<div class="empty">Noch nichts eingekauft</div>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <div class="item-title">${escapeHtml(item.name)}</div>
          <div class="item-meta">
            gekauft von ${escapeHtml(item.bought_by_nickname || "Unbekannt")}<br>
            ${formatDate(item.checked_at)}
          </div>
          ${item.comment ? `<div class="comment">${escapeHtml(item.comment)}</div>` : ""}
        `;

        box.appendChild(div);
      });
    }

    function showTab(tab) {
      const isList = tab === "list";

      document.getElementById("listTab").classList.toggle("hidden", !isList);
      document.getElementById("boughtTab").classList.toggle("hidden", isList);

      document.getElementById("listTabBtn").classList.toggle("active", isList);
      document.getElementById("boughtTabBtn").classList.toggle("active", !isList);
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      return new Date(dateString).toLocaleString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    init();
  </script>
</body>
</html>
